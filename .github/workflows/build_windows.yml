name: Build Windows Executable

# O script vai rodar automaticamente sempre que você fizer um 'push' para a branch 'main'
# ou quando você acionar manualmente no GitHub (workflow_dispatch)
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Versão que você está usando localmente

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install pygame PyOpenGL pyinstaller

    - name: Gerar o executável com PyInstaller
      run: |
        pyinstaller --onefile --windowed --add-data "assets;assets" --name "The_Shining_Maze" main.py

    - name: Salvar o .exe como um artefato para download
      uses: actions/upload-artifact@v4
      with:
        name: The_Shining_Maze_Windows
        path: dist/The_Shining_Maze.exe